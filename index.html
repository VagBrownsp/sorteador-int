<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Sorteador Vale Financeira</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="container">

    <div class="topo">

        <div class="icone">
            🎉
        </div>

        <h1>Sorteador Vale Financeira</h1>

        <p>
            Escolha a quantidade de vencedores.
        </p>

    </div>

    <div class="campo">

        <label for="quantidade">

            Quantidade de vencedores

        </label>

        <input
            id="quantidade"
            type="number"
            min="1"
            value="1">

    </div>

    <button id="btnSortear">

        🎲 Realizar Sorteio

    </button>

    <div id="mensagem"></div>

    <div id="resultadoSorteio"></div>

</div>

<script src="scripts.js"></script>

</body>

</html>
