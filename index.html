<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador Vale Financeira</title>

    <link rel="stylesheet" href="styles.css">

    <script src="scripts.js" defer></script>
</head>

<body>

    <div class="container">

        <h1>🎉 Sorteador Vale Financeira</h1>

        <label for="quantidade">
            Quantidade de vencedores
        </label>

        <input
            type="number"
            id="quantidade"
            min="1"
            value="1">

        <button id="btnSortear">
            Sortear
        </button>

        <div id="mensagem"></div>

        <div id="resultadoSorteio"></div>

    </div>

</body>
</html>
